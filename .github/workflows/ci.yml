name: Writers Workbench CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'writers-workbench/**'
      - 'workflows/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'writers-workbench/**'
      - 'workflows/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: writers-workbench

jobs:
  lint-and-typecheck:
    name: TypeScript & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: writers-workbench/package-lock.json
      - run: npm ci
      - run: npx tsc -p client/tsconfig.json --noEmit
      - run: npx tsc -p server/tsconfig.json --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: writers-workbench/package-lock.json
      - run: npm ci
      - run: npm run test

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: writers-workbench/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key
          VITE_N8N_WEBHOOK_URL: https://placeholder.example.com/webhook
          VITE_ELEVENLABS_AGENT_ID: placeholder-agent-id

  e2e-tests:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: writers-workbench/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_N8N_WEBHOOK_URL: ${{ secrets.VITE_N8N_WEBHOOK_URL }}
          VITE_ELEVENLABS_AGENT_ID: ${{ secrets.VITE_ELEVENLABS_AGENT_ID }}
      - run: npx playwright test --project=chromium-noauth
        env:
          CI: true
      - run: npx playwright test --project=setup --project=chromium
        if: ${{ env.E2E_TEST_EMAIL != '' }}
        env:
          CI: true
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: writers-workbench/playwright-report/
          retention-days: 7
