name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "First release — using last 50 commits as changelog"
            RANGE="HEAD~50..HEAD"
          else
            echo "Previous tag: $PREV_TAG"
            RANGE="${PREV_TAG}..HEAD"
          fi
          {
            echo "changelog<<EOF"
            git log --pretty=format:'- %s (%h)' "$RANGE"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Writers Workbench ${{ github.ref_name }}

            ### Changes since previous release
            ${{ steps.changelog.outputs.changelog }}

            ---

            Released via automated pipeline on tag push to `main`.
          draft: false
          prerelease: false
          generate_release_notes: true
